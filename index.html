<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Escape - Retro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Wadah Utama Perangkat Game Boy -->
    <div id="gameboy-device">
        <!-- Gambar Background Game Boy -->
        <img src="gameboy.png" id="gameboy-bg" alt="Game Boy Console">
        
        <!-- Area Layar -->
        <div id="game-screen-area">
            <div id="game-container">
                <!-- Tampilan UI Bar Atas -->
                <div id="ui-bar">
                    <div class="stat">❤️ <span id="hp-text">100</span></div>
                    <div class="stat">⭐ <span id="level-display">1</span></div>
                    <div class="stat">⏱️ <span id="time-display">00:00</span></div>
                    <div class="stat">🪙 <span id="score-display">0</span></div>
                </div>

                <!-- Kanvas Game -->
                <canvas id="gameCanvas" width="800" height="600"></canvas>

                <!-- Layar Menu / Game Over -->
                <div id="overlay" class="screen">
                    <div class="menu-content">
                        <h1 id="overlay-title">DUNGEON</h1>
                        <p id="overlay-desc">Lewati labirin dan basmi monster!</p>
                        <button id="start-btn">MULAI</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Area Sentuh Transparan (Hitboxes) -->
        <!-- D-Pad -->
        <div id="pad-up" class="hitbox dpad"></div>
        <div id="pad-down" class="hitbox dpad"></div>
        <div id="pad-left" class="hitbox dpad"></div>
        <div id="pad-right" class="hitbox dpad"></div>
        
        <!-- Action Buttons -->
        <div id="pad-b" class="hitbox round-btn"></div> <!-- Kiri (B) -> Lari -->
        <div id="pad-a" class="hitbox round-btn"></div> <!-- Kanan (A) -> Serang -->
        
        <!-- Start Button -->
        <div id="pad-start" class="hitbox pill-btn"></div> <!-- Pause -->
    </div>

    <script src="script.js"></script>
</body>
</html>
