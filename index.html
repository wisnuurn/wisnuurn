<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Tampilan UI Bar Atas -->
        <div id="ui-bar">
            <div class="stat">
                <span>❤️ HP:</span> 
                <div id="hp-bar">
                    <div id="hp-fill"></div>
                </div> 
                <span id="hp-text">100</span>
            </div>
            <div class="stat">
                <span>⭐ LEVEL:</span> 
                <span id="level-display">1</span>
            </div>
            <div class="stat">
                <span>⏱️ WAKTU:</span> 
                <span id="time-display">00:00</span>
            </div>
            <div class="stat">
                <span>🪙 SKOR:</span> 
                <span id="score-display">0</span>
            </div>
        </div>

        <!-- Kanvas Game -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- Layar Menu / Game Over / Pause (Overlay) -->
<div id="overlay" class="screen">
    <div class="menu-content">
        <h1 id="overlay-title">DUNGEON ESCAPE</h1>
        <p id="overlay-desc">Lewati labirin, ambil kunci, cari 💖 untuk pulih, basmi monster, dan temukan pintu keluar!</p>
        
        <!-- Kotak Panduan Kontrol -->
        <div class="controls-box">
            <h3>🎮 PANDUAN KONTROL</h3>
            <ul class="control-list">
                <li><kbd>W A S D</kbd> Bergerak</li>
                <li><kbd>SHIFT</kbd> Lari Cepat</li>
                <li class="highlight-atk"><kbd>KLIK KIRI</kbd> ⚔️ Serang</li>
                <li><kbd>P</kbd> Pause Game</li>
            </ul>
        </div>

        <button id="start-btn">MULAI GAME</button>
    </div>
</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
